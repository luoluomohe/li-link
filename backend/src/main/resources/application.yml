server:
  port: 8080

spring:
  application:
    name: shortlink
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/shortlink?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false
    username: root
    password: root
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 1000ms

app:
  host: http://localhost:8080
  short-domain: http://localhost:8080
  short-length: 6
  allow-custom-suffix: true
  jwt:
    secret: shortlink-secret-key-for-jwt-token-generation-must-be-long-enough
    expiration: 86400000
  async:
    core-pool-size: 5
    max-pool-size: 10
    queue-capacity: 100

springdoc:
  api-docs:
    enabled: true
    path: /api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html